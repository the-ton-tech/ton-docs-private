name: Search relevance eval

# Runs the offline relevance harness on PRs that touch the search pipeline or
# the docs content (which both change what gets indexed / how it ranks). The
# build step is required because the harness scores the same static index the
# browser would load — there is no live server.

on:
  pull_request:
    branches: ["**"]
    paths:
      - "next/src/lib/search-core.ts"
      - "next/src/app/api/search/**"
      - "next/scripts/search-eval/**"
      - "next/content/docs/**"
      - ".github/workflows/search-eval.yml"
  push:
    branches: ["main", "master"]
    paths:
      - "next/src/lib/search-core.ts"
      - "next/src/app/api/search/**"
      - "next/scripts/search-eval/**"
      - "next/content/docs/**"
      - ".github/workflows/search-eval.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  search-eval:
    name: Curated relevance gate
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      HUSKY: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: next/package-lock.json

      - name: Install dependencies
        working-directory: next
        run: npm ci

      - name: Generate Fumadocs source
        working-directory: next
        run: npm run generated-source

      # Phase-1 harness check (24 assertions): index loads, BM25 blend
      # active, deterministic ranking. Cheap and runs without the full build,
      # so we fail fast here if the harness itself is broken.
      - name: Search harness smoke
        working-directory: next
        run: npm run search:smoke

      # `npm run build` writes out/api/search — the same Orama dump the
      # browser fetches. The harness scores from this file directly, so the
      # build cost is unavoidable.
      - name: Next build (produces out/api/search)
        working-directory: next
        run: npm run build

      # The relevance gate: shipped DEFAULT_TUNING on curated + held-out
      # mined-test + gold slices must clear the floors documented in
      # `scripts/search-eval/floors.json` (read by ci-check.ts). The gate
      # also warns when shipped exceeds the recorded floor by more than
      # the slack — that's the ratchet prompt for the next commit to
      # bump floors.json.
      - name: Relevance gate
        working-directory: next
        run: npm run search:ci

      # Binary 4-slice report: curated (126 hand queries), mined-train (663),
      # mined-test (712). Includes paired-permutation significance vs the
      # shipped DEFAULT_TUNING. Advisory — full ablation output is in the
      # job logs.
      - name: Binary slice report
        working-directory: next
        run: npm run search:report

      # Graded report (Opus 349-query gold slice, α median 1.000). The
      # highest-signal measurement we have. Reports tuned vs baseline on
      # graded nDCG@10 / ERR@10 / grade-at-rank-1 plus per-intent breakdown.
      - name: Graded slice report
        working-directory: next
        run: npm run search:report:graded -- --vs-baseline

      # Legacy byte-compare ablation. Confirms levers behave deterministically
      # (bm25Weight=0 = exact pre-blend behavior, etc.). Fails the job if
      # determinism is broken.
      - name: Legacy ablation
        working-directory: next
        run: npm run search:eval
