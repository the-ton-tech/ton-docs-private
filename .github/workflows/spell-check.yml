name: Spell check

on:
  pull_request:
    branches: ["**"]
    paths:
      - "next/**"
      - ".github/workflows/spell-check.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  spell-check:
    name: Spelling
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Shallow on purpose: a full clone makes cspell-action misfire
          # on files that exist on main but not on the PR branch.
          persist-credentials: false

      - name: Run CSpell on next/ Markdown and MDX files
        uses: streetsidesoftware/cspell-action@9cd41bb518a24fefdafd9880cbab8f0ceba04d28 # v8.3.0
        with:
          files: next/**/*.{md,mdx}
          config: next/.cspell.jsonc
          suggestions: true
